databases:
  - name: mmorpg-db
    plan: free
    region: singapore

services:
  - type: web
    name: mmorpg-server
    runtime: node
    plan: free
    region: singapore
    rootDir: server
    # --include=dev: NODE_ENV=production이 빌드 단계에도 적용되면서 npm install이 devDependencies
    # (nest CLI, typescript 등 빌드에만 필요한 패키지)를 건너뛰어 `nest: not found`로 빌드가 실패하는
    # 걸 막는다. 런타임(start:prod)은 컴파일된 dist/main.js만 실행하므로 devDependencies가 없어도 된다.
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mmorpg-db
          property: connectionString
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      # 아래 두 개는 Render 대시보드에서 직접 값을 입력한다(sync: false = render.yaml에 값을 안 적음).
      # 로컬 .env의 플레이스홀더를 그대로 쓰면 안 되고, 프로덕션 전용 랜덤 값을 새로 생성해서 넣는다.
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # 프론트(Vercel) 배포 URL이 정해진 뒤에 채운다. 예: "https://mmorpg-idle.vercel.app"
      - key: CORS_ORIGINS
        sync: false
